# Sobe banco + aplicação com um único comando: `docker compose up --build`.
# A app só inicia depois que o Postgres estiver de fato pronto para aceitar conexões
# (depends_on + healthcheck) — isso evita a maior parte das corridas de inicialização,
# mas o retry de migration em Program.cs continua sendo a rede de segurança final.

services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orcalar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orcalar}
      POSTGRES_DB: ${POSTGRES_DB:-orcalar}
    volumes:
      - orcalar_db_data:/var/lib/postgresql/data
    ports:
      # Publicada no host para permitir o fluxo "só o banco no Docker, back-end via
      # dotnet run direto" (útil em dev) — a app do serviço "app" acima não depende
      # disso, ela fala com "db" pela rede interna do compose.
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orcalar} -d ${POSTGRES_DB:-orcalar}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Mesmo formato URI (postgresql://user:senha@host:porta/banco) que o Railway injeta
      # em produção — o helper de parse (DatabaseUrlParser) é o mesmo nos dois ambientes,
      # só muda o host: "db" (nome do serviço, sem ponto) aqui, domínio real lá.
      DATABASE_URL: postgresql://${POSTGRES_USER:-orcalar}:${POSTGRES_PASSWORD:-orcalar}@db:5432/${POSTGRES_DB:-orcalar}
      PORT: ${PORT:-8080}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

volumes:
  orcalar_db_data:
